<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Orange rounded square background -->
  <rect width="512" height="512" rx="115" ry="115" fill="#F97316"/>
  <!-- White dot grid centered (original 44x44 scaled to ~220x220, centered at 256,256) -->
  <!-- Scale factor: 220/44 = 5, offset: 256 - 110 = 146 -->
  <!-- Row 1 -->
  <circle cx="186" cy="186" r="25" fill="white"/>
  <circle cx="256" cy="186" r="25" fill="white"/>
  <circle cx="326" cy="186" r="25" fill="white"/>
  <!-- Row 2 -->
  <circle cx="186" cy="256" r="25" fill="white"/>
  <circle cx="256" cy="256" r="25" fill="white"/>
  <!-- Row 3 -->
  <circle cx="186" cy="326" r="25" fill="white"/>
  <circle cx="256" cy="326" r="25" fill="white"/>
  <circle cx="326" cy="326" r="25" fill="white"/>
  <!-- Connecting lines -->
  <line x1="186" y1="186" x2="256" y2="256" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="186" x2="326" y2="186" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="186" y2="326" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="326" y2="326" stroke="white" stroke-width="14" stroke-linecap="round"/>
</svg>
